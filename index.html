<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baixar APKs TV</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #111;
    color: white;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
}

h1 {
    text-align: center;
}

.app-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.app-item {
    display: flex;
    align-items: center;
    background: #222;
    padding: 20px;
    border-radius: 10px;
    transition: 0.2s;
    outline: none;
}

.app-item:focus {
    border: 3px solid #4CAF50;
    background: #333;
    transform: scale(1.03);
}

.app-image {
    width: 120px;
    border-radius: 10px;
    margin-right: 20px;
}

.app-description {
    flex: 1;
}

.app-name {
    font-size: 22px;
    color: #4CAF50;
}

a {
    background-color: #4CAF50;
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="container">
    <h1>APKs para TV</h1>

    <div class="app-list">

        <div class="app-item" tabindex="0">
            <img src="https://play-lh.googleusercontent.com/pvGdA_fFqMNDDZ2hef1_qK0VapDKMrmidKrYcD0OmLfcKcMwM_yOGlLajjVx2tzXf_Q=w600-h300-pc0xffffff-pd" class="app-image">
            <div class="app-description">
                <div class="app-name">IBO REVENDA</div>
            </div>
            <a href="https://www.mediafire.com/file/wg4f86cdtfv75pf/IBO_REVENDA_5.0_APKPure.apk">Baixar</a>
        </div>

        <div class="app-item" tabindex="0">
            <img src="https://play-lh.googleusercontent.com/abnuAt-l3UKjwafZESFM-qVLVq-BHDwWUVX91OeuM5bJTPRlfyrj18bptDnkt_7ZhqsZ=w600-h300-pc0xffffff-pd" class="app-image">
            <div class="app-description">
                <div class="app-name">IBO SHAMEL</div>
            </div>
            <a href="https://www.mediafire.com/file/af9wym9ukcgu0gv/shamel_%25281%2529.apk">Baixar</a>
        </div>

        <div class="app-item" tabindex="0">
            <img src="https://apps.paineltbf.com.br/logo.png" class="app-image">
            <div class="app-description">
                <div class="app-name">TURBO FLIX</div>
            </div>
            <a href="https://www.mediafire.com/file/sxksoli8gv6gzr1/turboflixibo.apk/file">Baixar</a>
        </div>

        <div class="app-item" tabindex="0">
            <img src="https://smarttubeapp.net/wp-content/uploads/2025/09/SmartTube-icon.webp" class="app-image">
            <div class="app-description">
                <div class="app-name">SmartTube</div>
            </div>
            <a href="https://www.mediafire.com/file/2x6hwxoe56atx8k/SmartTube_beta_30.68_armeabi-v7a%25281%2529.apk">Baixar</a>
        </div>

        <div class="app-item" tabindex="0">
            <img src="https://a.imagem.app/BMDFCC.jpeg" class="app-image">
            <div class="app-description">
                <div class="app-name">Uni Revenda</div>
            </div>
            <a href="https://www.mediafire.com/file/iyipuxtdo5ium4x/UniRevenda.apk/file">Baixar</a>
        </div>

    </div>
</div>

<script>
// Navegação com controle remoto (teclado)
const items = document.querySelectorAll('.app-item');

let current = 0;
items[current].focus();

document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowDown") {
        current = (current + 1) % items.length;
        items[current].focus();
    }
    if (e.key === "ArrowUp") {
        current = (current - 1 + items.length) % items.length;
        items[current].focus();
    }
});
</script>

</body>
</html>
