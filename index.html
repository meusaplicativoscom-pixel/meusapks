<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baixar APKs</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
    background-color: #f5f5f5;
}
.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    background-color: #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 8px;
}
h1 {
    color: #333;
}
.app-list {
    text-align: left;
    margin-top: 20px;
}
.app-item {
    margin: 15px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.app-image {
    max-width: 80px;
    margin-right: 20px;
    border-radius: 8px;
}
.app-name {
    font-weight: bold;
    color: #4CAF50;
}
.app-description {
    flex-grow: 1;
}
a {
    background-color: #4CAF50;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    display: inline-block;
}
a:hover {
    background-color: #45a049;
}
</style>
</head>
<body>

<div class="container">
    <h1>APKs do Baixar</h1>
    <p>Escolha o aplicativo que você deseja baixar:</p>

    <div class="app-list">
        <!-- Aplicativo 1 -->
        <div class="app-item">
            <img src="https://play-lh.googleusercontent.com/pvGdA_fFqMNDDZ2hef1_qK0VapDKMrmidKrYcD0OmLfcKcMwM_yOGlLajjVx2tzXf_Q=w600-h300-pc0xffffff-pd" alt="Ícone do Aplicativo 1" class="app-image">
            <div class="app-description">
                <p class="app-name">Aplicativo 1</p>
                <p>IBO RREVENDA</p>
            </div>
            <a href="https://www.mediafire.com/file/wg4f86cdtfv75pf/IBO_REVENDA_5.0_APKPure.apk" download>Baixar APK - Aplicativo 1</a>
        </div>
        <!-- Aplicativo 2 -->
        <div class="app-item">
            <img src="https://play-lh.googleusercontent.com/abnuAt-l3UKjwafZESFM-qVLVq-BHDwWUVX91OeuM5bJTPRlfyrj18bptDnkt_7ZhqsZ=w600-h300-pc0xffffff-pd" alt="Ícone do Aplicativo 2" class="app-image">
            <div class="app-description">
                <p class="app-name">Aplicativo 2</p>
                <p>IBO SHAMEL</p>
            </div>
            <a href="https://www.mediafire.com/file/af9wym9ukcgu0gv/shamel_%25281%2529.apk" download>Baixar APK - Aplicativo 2</a>
        </div>
        <!-- Aplicativo 3 -->
        <div class="app-item">
            <img src="https://apps.paineltbf.com.br/logo.png" alt="Ícone do Aplicativo 3" class="app-image">
            <div class="app-description">
                <p class="app-name">Aplicativo 3</p>
                <p>TURBO FLIX</p>
            </div>
            <a href="https://www.mediafire.com/file/sxksoli8gv6gzr1/turboflixibo.apk/file" download>Baixar APK - Aplicativo 3</a>
        </div>
    </div>
</div>

<button id="btnInstall" style="display:none;">📲 Instalar App</button>

<script>
let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstall.style.display = "block"; // mostra o botão
});

btnInstall.addEventListener("click", async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log("Resultado da instalação:", outcome);
        deferredPrompt = null;
        btnInstall.style.display = "none";
    }
});

// Registrar Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker registrado!'))
    .catch((err) => console.log('Falha ao registrar SW:', err));
}
</script>

</body>
</html>
